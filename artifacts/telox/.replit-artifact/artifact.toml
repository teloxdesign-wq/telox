kind = "web"
previewPath = "/"
title = "TELOX Agency"
version = "1.0.0"
id = "artifacts/telox"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22829

[services.development]
run = "pnpm --filter @workspace/telox run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/telox", "run", "build" ]
serve = "static"
publicDir = "artifacts/telox/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22829"
BASE_PATH = "/"
